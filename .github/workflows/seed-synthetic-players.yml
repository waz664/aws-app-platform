name: Seed Synthetic Players

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which non-production environment should receive the synthetic roster?
        required: true
        default: both
        type: choice
        options:
          - dev
          - stage
          - both

permissions:
  contents: read
  id-token: write

concurrency:
  group: seed-synthetic-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  seed-dev:
    if: ${{ github.event.inputs.target == 'dev' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}

      - name: Install dependencies
        run: npm ci

      - name: Seed synthetic players for dev
        run: node ./scripts/seed-synthetic-players.mjs --env dev --count 80

  seed-stage:
    if: ${{ github.event.inputs.target == 'stage' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}

      - name: Install dependencies
        run: npm ci

      - name: Seed synthetic players for stage
        run: node ./scripts/seed-synthetic-players.mjs --env stage --count 80
